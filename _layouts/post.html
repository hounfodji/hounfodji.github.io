---
layout: default
---
<article class="wrap post">
  <a class="back" href="{{ '/blog/' | relative_url }}">← Tous les articles</a>

  <header class="post-header">
    <p class="post-meta">
      {% include date-fr.html date=page.date %}
      · {{ page.content | number_of_words | divided_by: 200 | plus: 1 }} min de lecture
    </p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}<p class="post-desc">{{ page.description }}</p>{% endif %}
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
