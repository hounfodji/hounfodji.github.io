  Notes techniques depuis Cotonou : vision par ordinateur, modèles
  embarqués, et l'IA pensée pour le contexte africain.
author: Hospice

# 👉 Décommente et mets ton vrai pseudo GitHub une fois le dépôt créé.
#    (indispensable pour le flux RSS et le SEO)
url: "https://hounfodji.github.io"

# Liens du pied de page — édite ou supprime.
social:
  - { name: GitHub,   url: "https://github.com/hounfodji" }
  - { name: LinkedIn, url: "https://www.linkedin.com/in/hospice-hounfodji-44a2a7235/" }
  - { name: Email,    url: "mailto:hospicehounfodji@gmail.com" }

# ─── Réglages techniques (à ne pas toucher en général) ───────
permalink: /blog/:title/
markdown: kramdown
highlighter: rouge
timezone: Africa/Porto-Novo

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
